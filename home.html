<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <title>Junior Mejia</title>
</head>

<body>

  <!-- NAVBAR -->
  <header>
    <nav class="navbar">

      <div class="nav-left">
        <a href="#">Habilidades</a>
        <a href="#">Proyectos</a>
        <a href="#">Sobre Mi</a>
        <a href="#">Productos</a>
      </div>

      <div class="nav-center">
        <h1>Junior Mejia</h1>
      </div>

      <div class="nav-right">
        <a href="#">Instagram</a>
        <a href="#">Youtube</a>
      </div>

    </nav>
  </header>

  <main>
    <!-- HERO SECTION -->
    <section>
      <div class="hero hero-home">

        <div class="hero-imagen">
          <img
            src="https://images.pexels.com/photos/2763927/pexels-photo-2763927.jpeg"
            alt="Junior Mejia"
          />
        </div>

        <!-- BOTÓN -->
        <div class="hero-cta">
          <a class="btnhover btn-cta"  href="SOBRE MI">SOBRE MI</a>
        </div>

      </div>
    </section>

    <!-- TRABAJOS DESTACADOS -->
    <section id="trabajos">
      <div class="hero">

        <div class="hero-title">
          <h2>Trabajos destacados</h2>
        </div>

        <!-- Galeria -->
        <div class="hero-gallery">

          <div class="item-carrusel">
            <img src="img1.jpg" alt="Proyecto 1" />
          </div>

          <div class="item-carrusel">
            <img
              src="https://images.unsplash.com/photo-1572177812156-58036aae439c?crop=entropy&cs=srgb&fm=jpg&ixid=M3wzMjM4NDZ8MHwxfHJhbmRvbXx8fHx8fHx8fDE3NzExOTM5ODF8&ixlib=rb-4.1.0&q=85"
              alt="Proyecto 2"
            />
          </div>

          <div class="item-carrusel">
            <img
              src="https://images.unsplash.com/photo-1692699203597-b5a4464f3f9c?crop=entropy&cs=srgb&fm=jpg&ixid=M3wzMjM4NDZ8MHwxfHJhbmRvbXx8fHx8fHx8fDE3NzExOTM5ODF8&ixlib=rb-4.1.0&q=85"
              alt="Proyecto 3"
            />
          </div>

          <div class="item-carrusel">
            <img src="img4.jpg" alt="Proyecto 4" />
          </div>

        </div>
      </div>
    </section>
  </main>

</body>
</html>
