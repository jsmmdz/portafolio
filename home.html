<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <title>Junior Mejia | Inicio</title>
</head>

<body>

  <nav class="navbar">
    <a href="home.html" class="logo"> Junior Mejia </a>
    <div class="nav-links">
      <a href="#">Habilidades</a>
      <a href="#trabajos">Proyectos</a>
      <a href="aboutme.html">Sobre Mi</a>
      <a href="#">Productos</a>
    </div>
    <a href="#contacto" class="btn_contactame btnhover">Contactame</a>
  </nav>

  <main>
    <section>
      <div class="hero hero-home">

        <div class="hero-imagen">
          <img
            src="https://res.cloudinary.com/dc0ryz4kq/image/upload/v1776315785/WhatsApp_Image_2026-03-29_at_10.51.23_AM_otjrtn.jpg"
            alt="Junior Mejia"
          />
        </div>

        <div class="hero-cta">
          <a class="btnhover btn-cta" href="aboutme.html">SOBRE MI</a>
        </div>

      </div>
    </section>

    <section id="trabajos">
      <div class="hero">

        <div class="hero-title">
          <h2>Trabajos destacados</h2>
        </div>

        <div class="hero-gallery">

          <div class="item-carrusel">
            <a href="template.html" class="link-proyecto">
            <img
              src="https://res.cloudinary.com/dc0ryz4kq/image/upload/v1776315667/Captura_de_pantalla_2026-04-15_235355_s34fda.png"
              alt="Proyecto 1"
            />
          </div>

          <div class="item-carrusel">
            <a href="template.html" class="link-proyecto"></a>
            <img
              src="https://res.cloudinary.com/dc0ryz4kq/image/upload/v1776315437/Gemini_Generated_Image_fd4w7nfd4w7nfd4w_tfse5e.png"
              alt="Proyecto 2"
            />
          </div>


          
        </div>
      </div>
    </section>

    <section id="contacto" class="contacto">
        <h2 class="titulo-principal">¡Enviame tu Idea!</h2>
        <form>
            <input type="text" placeholder="Tu Nombre" required>
            <input type="email" placeholder="Tu Correo" required>
            <textarea placeholder="¿En qué te puedo ayudar?" required></textarea>
            <button type="submit" class="btn-primario btnhover">Enviar Mensaje</button>
        </form>
    </section>
  </main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="script.js"></script>

</body>
</html>
